spring.application.name=turo-fleet-manager

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/turo_fleet?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Multipart Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Configuration
server.port=9090

# Bouncie GPS Integration
bouncie.client-id=${BOUNCIE_CLIENT_ID:}
bouncie.client-secret=${BOUNCIE_CLIENT_SECRET:}
bouncie.api-key=${BOUNCIE_API_KEY:}
bouncie.redirect-uri=http://localhost:9090/api/bouncie/callback
bouncie.auth-url=https://auth.bouncie.com
bouncie.api-url=https://api.bouncie.dev/v1
